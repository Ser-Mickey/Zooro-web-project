<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zooro - Post a House</title>
</head>
<body>

    <header>
        <h1>🏠 Zooro Kenya</h1>
        <nav>
            <a href="index.html">Home</a> | 
            <a href="Listings.html">Listings</a> | 
            <a href="Post a House.html"><strong>Post a House</strong></a> | 
            <a href="Contact us.html">Contact us</a>
        </nav>
    </header>

    <hr>

    <main>
        <h2>List Your Property on Zooro</h2>
        <p>Reach thousands of tenants in Nairobi</p>
        <br>

        <form action="#" method="POST">
            
            <p>
                <label for="landlordName">Landlord Name:</label><br>
                <input type="text" id="landlordName" name="landlordName" placeholder="Enter your full name..." size="40" required>
            </p>

            <p>
                <label for="phoneNumber">Phone Number:</label><br>
                <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="e.g + 254 7 01111110" size="40" required>
            </p>

            <p>
                <label for="location">Location/Estate:</label><br>
                <input type="text" id="location" name="location" placeholder="e.g Kahawa West, Ngong Road..." size="40" required>
            </p>

            <p>
                <label for="houseType">House Type:</label><br>
                <select id="houseType" name="houseType" required>
                    <option value="" disabled selected>Bedsitter ▾</option>
                    <option value="studio">Studio</option>
                    <option value="1bed">1 Bed</option>
                    <option value="2bed">2 Bed</option>
                    <option value="3bed">3 Bed</option>
                </select>
            </p>

            <p>
                <label for="rent">Monthly Rent (Ksh):</label><br>
                <input type="number" id="rent" name="rent" placeholder="e.g. 25,000" required>
            </p>

            <p>
                <label for="availableFrom">Available From:</label><br>
                <input type="date" id="availableFrom" name="availableFrom" required>
            </p>

            <p>
                <label for="description">Description:</label><br>
                <textarea id="description" name="description" rows="6" cols="42" placeholder="Describe your property - amenities, nearby places..."></textarea>
            </p>

            <p>
                <label for="photo">Upload Photo:</label><br>
                <input type="file" id="photo" name="photo" accept="image/*">
            </p>
            
            <br>
            <button type="submit">Submit Listing</button>
        </form>
    </main>

    <br><hr>

    <footer>
        <p>&copy; 2026 Zooro Kenya. All rights reserved.</p>
    </footer>

</body>
</html>
